<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#181825"/>
      <stop offset="1" stop-color="#11111B"/>
    </linearGradient>
    
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#89B4FA"/> <stop offset="1" stop-color="#CBA6F7"/> </linearGradient>
    
    <linearGradient id="sparkleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F9E2AF"/>
      <stop offset="1" stop-color="#FAB387"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  
  <rect x="2" y="2" width="252" height="252" rx="54" fill="none" stroke="#313244" stroke-width="4"/>

  <g stroke="#45475A" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
    <path d="M 64 100 L 34 128 L 64 156" />
    <path d="M 192 100 L 222 128 L 192 156" />
  </g>

  <g transform="translate(136, 128) rotate(15) translate(-40, -55)" filter="url(#shadow)">
    <rect width="80" height="110" rx="12" fill="#313244" stroke="#45475A" stroke-width="2"/>
    <rect x="16" y="16" width="48" height="6" rx="3" fill="#45475A"/>
    <rect x="16" y="32" width="30" height="6" rx="3" fill="#45475A"/>
  </g>

  <g transform="translate(120, 128) rotate(-5) translate(-46, -65)" filter="url(#shadow)">
    <rect width="92" height="130" rx="12" fill="url(#cardGrad)"/>
    <rect x="8" y="8" width="76" height="114" rx="6" fill="none" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2"/>
    <text x="46" y="90" font-family="-apple-system, system-ui, sans-serif" font-weight="900" font-size="72" fill="#FFFFFF" text-anchor="middle">8</text>
  </g>

  <path d="M 190 40 Q 190 65 215 65 Q 190 65 190 90 Q 190 65 165 65 Q 190 65 190 40 Z" fill="url(#sparkleGrad)" filter="url(#shadow)"/>
  
  <path d="M 70 170 Q 70 185 85 185 Q 70 185 70 200 Q 70 185 55 185 Q 70 185 70 170 Z" fill="#94E2D5"/>
